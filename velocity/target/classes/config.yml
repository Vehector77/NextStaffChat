# =========================================================================
#  NextStaffChat - Velocity proxy configuration
#  Author: Vehector
#
#  This file lives at  /plugins/nextstaffchat/config.yml (Velocity side).
#  The backend Paper plugin has ITS OWN config.yml.
#
#  All visible text passes through MiniMessage, hex (&#RRGGBB) and legacy &.
# =========================================================================

toggle:
  enabled: true                # Allow /sc to toggle staff-chat mode on Velocity side too.

# ---------------------------------------------------------------------------
#  Standalone mode (Velocity-only, no Paper companion required).
#  ALL of these options are safe to leave at their defaults.
# ---------------------------------------------------------------------------
standalone:
  # When true, Velocity listens to PlayerChatEvent so /sc toggle mode and the
  # configurable chat-prefix can convert a normal chat line into a staff
  # message. NOTE: With signed chat (MC 1.19.1+) cancelling the original line
  # from the proxy is not always possible; players should use the /sc command
  # for guaranteed delivery. Disable this if you prefer a strict /sc workflow.
  intercept-chat: true
  # If non-empty, any message that starts with this prefix is routed to staff
  # chat (e.g. "!hello" -> staff chat "hello"). Empty disables prefix mode.
  chat-prefix: ""
  # Also forward the formatted broadcast to backend servers via plugin
  # messaging. Only useful when the Paper companion plugin IS installed.
  # It's safe to leave on – backends without the plugin simply drop it.
  forward-to-backends: true

modules:
  chat: true
  join-notify: true
  leave-notify: true
  server-switch-notify: true
  gamemode-change-notify: true  # Requires the Paper companion plugin (Velocity cannot detect gamemode).

logging:
  enabled: false
  file: "staffchat.log"
  date-format: "yyyy-MM-dd HH:mm:ss"

# All these formats receive the placeholders documented in the Paper config.
messages:
  chat-format: "<gray>[<dark_red><bold>STAFF</bold></dark_red>]</gray> <gold>%server%</gold> <dark_gray>|</dark_gray> <yellow>%rank%</yellow> <gray>%player%</gray> <dark_gray>»</dark_gray> <white>%message%"
  join-format: "<gray>[<dark_red><bold>STAFF</bold></dark_red>]</gray> <green>+</green> <yellow>%rank%</yellow> <gray>%player%</gray> <green>joined</green> <dark_gray>(</dark_gray><gold>%server%</gold><dark_gray>)</dark_gray>"
  leave-format: "<gray>[<dark_red><bold>STAFF</bold></dark_red>]</gray> <red>-</red> <yellow>%rank%</yellow> <gray>%player%</gray> <red>left</red> <dark_gray>(</dark_gray><gold>%server%</gold><dark_gray>)</dark_gray>"
  switch-format: "<gray>[<dark_red><bold>STAFF</bold></dark_red>]</gray> <aqua>»</aqua> <yellow>%rank%</yellow> <gray>%player%</gray> <white>moved</white> <dark_gray>(</dark_gray><red>%from%</red> <gray>→</gray> <green>%to%</green><dark_gray>)</dark_gray>"
  gamemode-format: "<gray>[<dark_red><bold>STAFF</bold></dark_red>]</gray> <light_purple>⚙</light_purple> <yellow>%rank%</yellow> <gray>%player%</gray> <white>now in</white> <aqua>%gamemode%</aqua> <dark_gray>(</dark_gray><gold>%server%</gold><dark_gray>)</dark_gray>"
  toggle-on: "<green>Staff chat <bold>enabled</bold>."
  toggle-off: "<red>Staff chat <bold>disabled</bold>."
  toggle-disabled: "<red>Staff chat toggling is disabled in the config."
  no-permission: "<red>You don't have permission to use the staff chat."
  mute-on: "<gray>You will no longer receive staff chat messages."
  mute-off: "<gray>You will now receive staff chat messages again."
  reload-success: "<green>NextStaffChat configuration reloaded."
  usage: "<gray>Usage: /sc [message]   |   /sc (toggle)"
