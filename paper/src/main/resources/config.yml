# =========================================================================
#  NextStaffChat - Paper configuration
#  Author: Vehector
# =========================================================================

# Set to false to make this Paper instance behave standalone (no Velocity).
# When true, every staff chat / event message is forwarded to the proxy
# and the proxy rebroadcasts it to all backend servers.
proxy-mode: true

# Name of THIS server. Used as fallback if Velocity does not override it
# (Velocity always overrides %server% with the real RegisteredServer name).
server-name: "lobby"

# Toggle settings: /sc with no args toggles staff-chat mode on/off.
toggle:
  enabled: true                # If false, /sc without args does nothing.
  persist-across-sessions: false
  reset-on-server-switch: true

# Modules: enable/disable any group of messages.
modules:
  chat: true
  join-notify: true
  leave-notify: true
  server-switch-notify: true     # only meaningful with Velocity
  gamemode-change-notify: true

# Sound played when a staff chat message is received (set type to "" to disable).
sound:
  enabled: true
  type: "BLOCK_NOTE_BLOCK_PLING"
  volume: 0.6
  pitch: 1.3

# Async file logging (does not block the main thread). Disable to remove all IO.
logging:
  enabled: false
  file: "staffchat.log"
  date-format: "yyyy-MM-dd HH:mm:ss"

# PlaceholderAPI integration: if PAPI is installed, %papi_xxx% placeholders work.
placeholderapi: true

# Built-in placeholders available everywhere:
#   %player%      - player name
#   %displayname% - player's display name
#   %server%      - server where the player is
#   %rank%        - LuckPerms primary group (falls back to PAPI %vault_rank% if present)
#   %prefix%      - PAPI %vault_prefix% (if PAPI+Vault present)
#   %suffix%      - PAPI %vault_suffix%
#   %message%    - the staff chat message content
#   %gamemode%    - new gamemode (only in gamemode-change message)
#   %from%        - previous server (only in server-switch message)
#   %to%          - new server (only in server-switch message)
