name: NextStaffChat
version: ${project.version}
main: com.vehector.nextstaffchat.paper.NextStaffChatPaper
api-version: '1.20'
author: Vehector
description: Fully customizable staff chat for Paper, compatible with Velocity proxy.
softdepend: [PlaceholderAPI]
folia-supported: false

commands:
  staffchat:
    description: Send a message to the staff chat or toggle staff chat mode.
    usage: /staffchat [message]
    aliases: [sc, schat]
  nextstaffchat:
    description: NextStaffChat admin commands.
    usage: /nextstaffchat <reload|mute>
    aliases: [nsc]

permissions:
  nextstaffchat.use:
    description: Allows reading and writing in the staff chat.
    default: op
  nextstaffchat.toggle:
    description: Allows toggling staff chat mode with /sc.
    default: op
  nextstaffchat.notify.join:
    description: Receives staff join notifications.
    default: op
  nextstaffchat.notify.leave:
    description: Receives staff leave notifications.
    default: op
  nextstaffchat.notify.switch:
    description: Receives staff server-switch notifications.
    default: op
  nextstaffchat.notify.gamemode:
    description: Receives staff gamemode-change notifications.
    default: op
  nextstaffchat.admin:
    description: Allows reload and admin commands.
    default: op
  nextstaffchat.mute:
    description: Allows muting/unmuting own staff chat.
    default: op
